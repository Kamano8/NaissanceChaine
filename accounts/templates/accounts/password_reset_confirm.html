{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">Nouveau mot de passe</h3>
                    {% if validlink %}
                        <p class="text-muted mb-4">Veuillez choisir votre nouveau mot de passe.</p>
                        <form method="post">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-primary w-100">Enregistrer</button>
                        </form>
                    {% else %}
                        <div class="alert alert-danger">
                            Le lien de réinitialisation est invalide ou a expiré.
                        </div>
                        <a href="{% url 'accounts:password_reset' %}" class="btn btn-primary w-100">Demander un nouveau lien</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
