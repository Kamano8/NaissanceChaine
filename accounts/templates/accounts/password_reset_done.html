{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card border-0 shadow-sm p-4">
                <div class="mb-3">
                    <i class="fas fa-paper-plane fa-3x text-success"></i>
                </div>
                <h3>E-mail envoyé</h3>
                <p class="text-muted">
                    Nous vous avons envoyé les instructions par e-mail. Si vous ne recevez rien, vérifiez vos courriers indésirables.
                </p>
                <a href="{% url 'accounts:connexion' %}" class="btn btn-outline-primary mt-3">Retour à la connexion</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
